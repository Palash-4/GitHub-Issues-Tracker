<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>

    <!-- Daisyui+tailwind -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- FontAwesome cdn -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

</head>

<body>
    <main class="mx-auto bg-white w-[400px] p-8 rounded-lg shadow-2xl">

        <div class="flex justify-center mb-4">
            <div class="flex items-center justify-center text-7xl">
                <i class="fa-brands fa-github"></i>
            </div>
        </div>

        <h2 class="text-center text-lg font-bold">
            GitHub Issues Tracker
        </h2>

        <p class="text-center text-sm text-gray-500 mb-6 font-semibold">
            Sign in to manage your issues
        </p>

        <!-- Username -->
        <label class="text-sm font-medium">Username</label>
        <input type="text" placeholder="Enter Username" class="input input-bordered w-full mt-1" />
        <p class="text-xs text-[#4A00FF] mb-3">
            Default: admin
        </p>

        <!-- Password -->
        <label class="text-sm font-medium">Password</label>
        <input type="password" placeholder="Enter Password" class="input input-bordered w-full mt-1" />
        <p class="text-xs text-[#4A00FF] mb-4">
            Default: admin123
        </p>

        <button class=" w-full btn btn-primary">
            Sign In
        </button>


        <div class="text-center text-sm text-gray-400 my-4">
            OR
        </div>

        <div class="bg-gray-100 rounded-md p-3 text-center text-sm">

            <p class="text-gray-500 mb-1">Demo:</p>
            <p>Username: admin</p>
            <p>Password: admin123</p>

        </div>

        </div>

    </main>

    <script src="./index.js"></script>
</body>



</html>
