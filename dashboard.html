<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Main</title>

    <!-- Daisyui+tailwind -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- FontAwesome cdn -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

</head>

<body>
    <nav>
        <div class="justify-between navbar bg-base-100 shadow-sm">
            <div class="flex gap-2 font-bold">
                <img class="size-6" src="./assets/github-logo.png" alt=""> GitHub Issues Tracker</a>
            </div>
            <div class="flex gap-2 items-center">

                <label class="input w-40 md:w-64">
                    <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                        <g stroke-linejoin="round" stroke-linecap="round" stroke-width="2.5" fill="none"
                            stroke="currentColor">
                            <circle cx="11" cy="11" r="8"></circle>
                            <path d="m21 21-4.3-4.3"></path>
                        </g>
                    </svg>
                    <input id="searchInput" type="search" placeholder="Search issues..." onkeyup="searchIssues()" />
                </label>

                <button class="btn btn-primary whitespace-nowrap">
                    <i class="fa-solid fa-plus"></i> New Issue
                </button>
            </div>
        </div>
    </nav>



    <!-- Tab -->
    <section class="max-w-6xl mx-auto mt-8">
        <div class="tabs tabs-boxed gap-1">
            <button onclick="setActiveTab(this); loadIssues('all')"
                class="tab tab-active btn btn-primary w-[120px] h-[40px]">All</button>

            <button onclick="setActiveTab(this); loadIssues('open')"
                class="tab  btn btn-primary w-[120px] h-[40px]">Open</button>

            <button onclick="setActiveTab(this); loadIssues('closed')"
                class="tab  btn btn-primary w-[120px] h-[40px]">Closed</button>

        </div>

    </section>




    <!-- issues -->
    <section class="max-w-6xl mx-auto mt-4">
        <div class="bg-white p-5 rounded-lg shadow flex justify-between">
            <div class="flex gap-3 items-center">
                <img src="./assets/Aperture.png" alt="">
                <div>
                    <h2 id="issueCount" class="font-semibold">
                        0 Issues
                    </h2>
                    <p class="text-sm text-gray-500">
                        Track and manage your project issues
                    </p>
                </div>
            </div>
            <div class="flex gap-4 text-sm">
                <div class="flex items-center gap-2">
                    <div class="w-3 h-3 bg-green-500 rounded-full"></div>
                    Open
                </div>
                <div class="flex items-center gap-2">
                    <div class="w-3 h-3 bg-purple-500 rounded-full"></div>
                    Closed
                </div>
            </div>
        </div>
    </section>



    <!-- spinner -->
    <div id="loader" class="text-center mt-10 hidden">
        <span class="loading loading-spinner loading-lg"></span>
    </div>



    <!-- cards -->
    <section class="max-w-6xl mx-auto mt-6">
        <div id="issuesContainer" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
        </div>
    </section>



    <!-- modal -->
    <dialog id="issueModal" class="modal">
        <div class="modal-box max-w-xl">
            <h3 id="modalTitle" class="font-bold text-lg mb-2">
                Fix broken image uploads
            </h3>
            <div class="flex items-center gap-3 text-sm mb-3">
                <span class="bg-green-100 text-green-600 px-3 py-1 rounded-full text-xs">
                    Open
                </span>

                <span class="text-gray-500">
                    Opened by <span id="modalAuthor" class="font-medium"></span>
                </span>
                <span class="text-gray-400">
                    <span id="modalDate"></span>
                </span>
            </div>
            <div class="flex gap-2 mb-3">
                <span class="text-xs border bg-red-200 border-red-400 text-red-500 px-3 py-1 rounded-full">
                    BUG
                </span>
                <span class="text-xs border bg-yellow-200 border-yellow-400 text-yellow-600 px-3 py-1 rounded-full">
                    HELP WANTED
                </span>
            </div>
            <p id="modalDescription" class="text-gray-500 text-sm mb-4">
                Issue description here
            </p>
            <div class="bg-gray-100 rounded-lg p-4 grid grid-cols-2 gap-4 text-sm">
                <div>
                    <p class="text-gray-500">Assignee :</p>
                    <p id="modalAssignee" class="font-medium"></p>
                </div>
                <div>
                    <p class="text-gray-500">Priority :</p>
                    <span id="modalPriority" class="text-xs px-3 py-1 rounded-full bg-red-100 text-red-600">
                        HIGH
                    </span>
                </div>
            </div>
            <div class="modal-action">
                <form method="dialog">
                    <button class="btn btn-primary">
                        Close
                    </button>
                </form>
            </div>
        </div>
    </dialog>



    <script src="./dashboard.js" defer></script>

</body>

</html>
